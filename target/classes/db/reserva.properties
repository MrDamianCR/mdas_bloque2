# =========================================
# Consultas SQL para la tabla Reserva
# =========================================

# Listar todas las reservas
select-all=SELECT id_reserva, fecha, plazas_reservadas, descripcion, precio_total, dni_socio, matricula FROM Reserva;

# Insertar una nueva reserva
insert=INSERT INTO Reserva (fecha, plazas_reservadas, descripcion, precio_total, dni_socio, matricula) VALUES (?,?,?,?,?,?);

# Contar reservas de una embarcación en una fecha concreta
count-by-boat-and-date=SELECT COUNT(*) FROM Reserva WHERE matricula = ? AND DATE(fecha) = ?;

# Obtener reserva por id
select-by-id=SELECT id_reserva, fecha, plazas_reservadas, descripcion, precio_total, dni_socio, matricula FROM Reserva WHERE id_reserva = ?;

# Contar reservas de una embarcación en una fecha concreta excluyendo una reserva (útil para PATCH de fecha)
count-by-boat-and-date-excluding-id=SELECT COUNT(*) FROM Reserva WHERE matricula = ? AND DATE(fecha) = ? AND id_reserva <> ?;

# Actualizar fecha de una reserva
update-fecha=UPDATE Reserva SET fecha = ? WHERE id_reserva = ?;

# Actualizar datos (descripción, plazas y precio) de una reserva
update-datos=UPDATE Reserva SET descripcion = ?, plazas_reservadas = ?, precio_total = ? WHERE id_reserva = ?;

# Borrar una reserva por id
delete-by-id=DELETE FROM Reserva WHERE id_reserva = ?;
