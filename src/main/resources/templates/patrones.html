<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de Patrones</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* ===== ESTILO GENERAL ===== */
      body {
        font-family: "Poppins", Arial, sans-serif;
        background: #f4f7fb;
        color: #1f2a3c;
        margin: 24px;
      }

      .muted {
        color: #6b768c;
        font-size: 0.92rem;
      }

      .patrones-header {
        background: linear-gradient(135deg, #0f5c9c, #1ca7ec);
        color: #ffffff;
        border-radius: 18px;
        padding: 18px 20px;
        margin-bottom: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      }

      .patrones-header h1 {
        margin: 0 0 4px;
        font-size: 1.9rem;
        color: #ffffff;
      }

      .patrones-header p {
        margin: 0;
        color: #e5f2ff;
        font-size: 0.95rem;
      }

      .actions {
        margin: 10px 0 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      input[type="text"],
      input[type="date"] {
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 999px;
        font-size: 0.9rem;
        background: #ffffff;
        transition: 0.2s;
      }

      input[type="text"]:focus,
      input[type="date"]:focus {
        outline: none;
        border-color: #0a79df;
        box-shadow: 0 0 0 2px rgba(10, 121, 223, 0.15);
      }

      button,
      a.button {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        cursor: pointer;
        text-decoration: none;
        color: #1f2937;
        font-size: 0.9rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: 0.25s;
      }

      button:hover,
      a.button:hover {
        border-color: #0a79df;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(15, 35, 68, 0.12);
      }

      button.primary {
        background: #0a79df;
        color: #ffffff;
        border-color: #0a79df;
        box-shadow: 0 8px 20px rgba(10, 121, 223, 0.35);
      }

      button.primary:hover {
        background: #0867bd;
      }

      form.inline {
        display: inline;
      }

      /* ===== PANEL MENSAJES ===== */
      .panel {
        border: 1px solid rgba(10, 121, 223, 0.06);
        border-radius: 16px;
        padding: 16px 18px;
        margin-top: 16px;
        background: #ffffff;
        box-shadow: 0 10px 25px rgba(15, 35, 68, 0.08);
        font-size: 0.95rem;
      }

      .panel-error {
        background: #fff1f2;
        border-color: #fecaca;
        color: #7f1d1d;
      }

      /* ===== TABLA ===== */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 14px;
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(15, 35, 68, 0.08);
      }

      th,
      td {
        padding: 10px 12px;
        text-align: left;
        font-size: 0.93rem;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #f9fafb;
        font-weight: 600;
        color: #374151;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .right {
        text-align: right;
        white-space: nowrap;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        body {
          margin: 16px;
        }

        table {
          font-size: 0.85rem;
        }

        th,
        td {
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>

    <!-- PANEL SUPERIOR -->
    <div class="patrones-header">
      <h1>Gestión de Patrones</h1>
      <p>Listado, búsqueda y eliminación de patrones del club.</p>
    </div>

    <div class="actions">
      <a class="button" th:href="@{/}" style="font-size: 18px">←</a>

      <!-- refrescar lista -->
      <a class="button" th:href="@{/patrones/listar}">Refrescar lista</a>

      <!-- volver al inicio -->
      <a class="button" th:href="@{/}">Inicio</a>

      <!-- Búsqueda por DNI -->
      <form th:action="@{/patrones/buscar}" method="get" class="row">
        <input type="text" name="dni" placeholder="Buscar por DNI" />
        <button type="submit">Buscar</button>
      </form>
    </div>

    <!-- Mensajes -->
    <div th:if="${mensaje}" class="panel" th:text="${mensaje}"></div>
    <div
      th:if="${error}"
      class="panel panel-error"
      th:text="${error}"
    ></div>

    <!-- LISTADO DE PATRONES -->
    <table>
      <thead>
        <tr>
          <th>DNI</th>
          <th>Nombre</th>
          <th>Apellidos</th>
          <th>Fecha nacimiento</th>
          <th>Fecha expiración título</th>
          <th class="right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${patrones}">
          <td th:text="${p.dni_patron}">00000000A</td>
          <td th:text="${p.nombre}">Nombre</td>
          <td th:text="${p.apellidos}">Apellidos</td>
          <td th:text="${p.fecha_nacimiento}">2000-01-01</td>
          <td th:text="${p.fecha_exp_patron}">2030-01-01</td>
          <td class="right">
            <!-- SOLO ELIMINAR -->
            <form
              class="inline"
              th:action="@{/patrones/eliminar}"
              method="post"
              onsubmit="return confirm('¿Eliminar al patrón con DNI ' + this.dni.value + '?')"
            >
              <input type="hidden" name="dni" th:value="${p.dni_patron}" />
              <button type="submit">Eliminar</button>
            </form>
          </td>
        </tr>

        <!-- fila cuando no hay datos -->
        <tr th:if="${patrones == null or #lists.isEmpty(patrones)}">
          <td colspan="6" class="muted">No hay patrones que mostrar.</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
